<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soportitas del Mes</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        background: #000;
    }

    /* Fondo dinámico */
    body::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle at 30% 30%, #1a1a1a, #000 60%),
                    radial-gradient(circle at 70% 70%, #222, #000 70%);
        animation: moveBg 12s infinite alternate ease-in-out;
        z-index: 0;
    }

    @keyframes moveBg {
        0% { transform: translate(0,0) scale(1); }
        100% { transform: translate(-5%, -5%) scale(1.1); }
    }

    /* Glow detrás de la imagen */
    .glow {
        position: absolute;
        width: 80vw;
        height: 80vh;
        background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
        filter: blur(80px);
        z-index: 1;
    }

    .container {
        position: relative;
        z-index: 2;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
    }

    img {
        max-width: 95%;
        max-height: 95%;
        object-fit: contain;
        border-radius: 12px;
        box-shadow:
            0 20px 60px rgba(0,0,0,0.8),
            0 0 25px rgba(255,255,255,0.1);
        transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    img:hover {
        transform: scale(1.03);
        box-shadow:
            0 30px 80px rgba(0,0,0,0.9),
            0 0 40px rgba(255,255,255,0.2);
    }

    /* Sutil viñeta para look cinematográfico */
    .vignette {
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.8));
        z-index: 3;
        pointer-events: none;
    }
</style>
</head>

<body>

<div class="glow"></div>

<div class="container">
    <img src="soportiñas_inblack.png" alt="Soportitas del mes">
</div>

<div class="vignette"></div>

</body>
</html>
